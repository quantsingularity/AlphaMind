name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  code_quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    env:
      BACKEND_DIR: code/backend
      WEB_FRONTEND_DIR: web-frontend
      MOBILE_FRONTEND_DIR: mobile-frontend
      INFRASTRUCTURE_DIR: infrastructure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: code/backend/requirements.txt

      - name: Install Python formatters
        run: |
          python -m pip install --upgrade pip
          python -m pip install autoflake black==25.11.0

      - name: Check backend Python formatting
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d "${BACKEND_DIR}" ]; then
            echo "Backend directory not found — skipping."
            exit 0
          fi
          # Using black check is enough for CI to fail if not formatted
          black "${BACKEND_DIR}" --check

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        working-directory: tools
        run: npm install

      - name: Check web frontend formatting
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "${WEB_FRONTEND_DIR}" ]; then
            echo "=== Running Prettier (web frontend) ==="
            npx --prefix tools prettier --check "${WEB_FRONTEND_DIR}/**/*.{js,jsx,ts,tsx,json,html,css,md}"
          else
            echo "Web frontend directory not found — skipping."
          fi

      - name: Check mobile frontend formatting
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "${MOBILE_FRONTEND_DIR}" ]; then
            echo "=== Running Prettier (mobile frontend) ==="
            npx --prefix tools prettier --check "${MOBILE_FRONTEND_DIR}/**/*.{js,jsx,ts,tsx,json,html,css,md}"
          else
            echo "Mobile frontend directory not found — skipping."
          fi

      - name: Check markdown formatting
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Running Prettier (all markdown files) ==="
          npx --prefix tools prettier --check "**/*.md"

      - name: Check infrastructure YAML formatting
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "${INFRASTRUCTURE_DIR}" ]; then
            echo "=== Running Prettier (infrastructure YAML/YML) ==="
            npx --prefix tools prettier --check "${INFRASTRUCTURE_DIR}/**/*.{yml,yaml}"
          else
            echo "Infrastructure directory not found — skipping."
          fi

      - name: Quality checks complete
        run: echo "All formatting checks completed successfully."

  backend_tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: code_quality

    env:
      BACKEND_DIR: code/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: code/backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f "${BACKEND_DIR}/requirements.txt" ]; then
            python -m pip install -r "${BACKEND_DIR}/requirements.txt"
          fi
          python -m pip install pytest pytest-cov pytest-asyncio

      - name: Run backend test suite
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          set -euo pipefail
          echo "=== Running backend tests ==="
          pytest tests/ \
            --tb=short \
            --strict-markers \
            -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: ${{ env.BACKEND_DIR }}/test-results.xml
          retention-days: 30

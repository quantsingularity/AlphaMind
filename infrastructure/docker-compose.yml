version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
  database-net:
    driver: bridge
    internal: true

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  backend-logs:
    driver: local

services:
  # ── Database ──────────────────────────────────────────────
  database:
    image: mysql:8.0
    container_name: alphamind-database
    restart: unless-stopped
    networks:
      - database-net
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-alphamind_db}
      MYSQL_USER: ${MYSQL_USER:-alphamind_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    ports: []
    healthcheck:
      <<: *healthcheck-defaults
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-u",
          "root",
          "-p$$MYSQL_ROOT_PASSWORD",
        ]
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7.0-alpine
    container_name: alphamind-redis
    restart: unless-stopped
    networks:
      - backend-net
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - --appendonly
      - "yes"
      - --save
      - "60 1"
      - --loglevel
      - warning
    volumes:
      - redis-data:/data
    ports: []
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "-a", "$$REDIS_PASSWORD", "ping"]
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ── Backend ───────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: runtime
    image: alphamind/backend:${IMAGE_TAG:-latest}
    container_name: alphamind-backend
    restart: unless-stopped
    networks:
      - backend-net
      - database-net
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_HOST: database
      DATABASE_PORT: 3306
      DATABASE_NAME: ${MYSQL_DATABASE:-alphamind_db}
      DATABASE_USER: ${MYSQL_USER:-alphamind_user}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 8080
    volumes:
      - backend-logs:/app/logs
    ports: []
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=50m,noexec,nosuid

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      target: runtime
      args:
        REACT_APP_API_URL: /api
        REACT_APP_ENV: ${NODE_ENV:-production}
    image: alphamind/frontend:${IMAGE_TAG:-latest}
    container_name: alphamind-frontend
    restart: unless-stopped
    networks:
      - frontend-net
      - backend-net
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost/nginx-health"]
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

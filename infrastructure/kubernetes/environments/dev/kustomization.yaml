apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: alphamind-dev

namePrefix: dev-

patches:
  - target:
      kind: Deployment
      name: alphamind-backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: development
  - target:
      kind: Deployment
      name: alphamind-frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: development
  - target:
      kind: Ingress
      name: alphamind-ingress
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: dev.alphamind.example.com
      - op: replace
        path: /spec/rules/0/host
        value: dev.alphamind.example.com
  - target:
      kind: HorizontalPodAutoscaler
      name: alphamind-backend-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
  - target:
      kind: HorizontalPodAutoscaler
      name: alphamind-frontend-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

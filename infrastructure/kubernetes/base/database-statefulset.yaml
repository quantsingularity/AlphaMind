---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: alphamind-database
  labels:
    app: alphamind-database
spec:
  serviceName: alphamind-database
  replicas: 1
  selector:
    matchLabels:
      app: alphamind-database
  template:
    metadata:
      labels:
        app: alphamind-database
    spec:
      securityContext:
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: alphamind-database
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3306
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 500m
              memory: 512Mi
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: alphamind-secrets
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              value: alphamind_db
            - name: MYSQL_USER
              value: alphamind_user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: alphamind-secrets
                  key: mysql-password
          volumeMounts:
            - name: alphamind-database-data
              mountPath: /var/lib/mysql
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - mysqladmin ping -h 127.0.0.1 -u root -p"${MYSQL_ROOT_PASSWORD}"
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - mysql -h 127.0.0.1 -u root -p"${MYSQL_ROOT_PASSWORD}" -e "SELECT 1"
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: alphamind-database-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alphamind-backend
  labels:
    app: alphamind-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alphamind-backend
  template:
    metadata:
      labels:
        app: alphamind-backend
    spec:
      serviceAccountName: alphamind-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: alphamind-backend
          image: alphamind/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: alphamind-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: alphamind-secrets
                  key: jwt-secret
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: alphamind-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: alphamind-config
                  key: REDIS_PORT
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
      volumes:
        - name: tmp-dir
          emptyDir: {}
      imagePullSecrets:
        - name: regcred

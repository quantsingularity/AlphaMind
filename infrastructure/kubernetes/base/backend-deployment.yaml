---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alphamind-backend
  labels:
    app: alphamind-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alphamind-backend
  template:
    metadata:
      labels:
        app: alphamind-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: alphamind-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: alphamind-backend
          image: alphamind/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000 # FastAPI / uvicorn default
              name: http
              protocol: TCP
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            # Python/FastAPI environment variable (not NODE_ENV)
            - name: ENVIRONMENT
              value: production
            - name: API_PORT
              value: "8000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: alphamind-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: alphamind-secrets
                  key: jwt-secret
            # The backend signs JWTs with SECRET_KEY; source it from the same secret.
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: alphamind-secrets
                  key: jwt-secret
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: alphamind-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: alphamind-config
                  key: REDIS_PORT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: alphamind-config
                  key: LOG_LEVEL
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: alphamind-config
                  key: ALLOWED_ORIGINS
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
      volumes:
        - name: tmp-dir
          emptyDir: {}
      imagePullSecrets:
        - name: regcred

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alphamind-frontend
  labels:
    app: alphamind-frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: alphamind-frontend
  template:
    metadata:
      labels:
        app: alphamind-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
        - name: alphamind-frontend
          image: alphamind/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: 300m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          # NOTE: For the static Vite SPA, the API base URL is inlined at build
          # time (VITE_API_BASE_URL build arg). The app issues relative /api/...
          # requests that the Ingress routes to the backend, so this is empty.
          env:
            - name: VITE_API_BASE_URL
              value: ""
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
      imagePullSecrets:
        - name: regcred
